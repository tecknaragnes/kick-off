<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <script type="module" src="filter.js"></script>
    <title>Aktiviteter</title>
</head>

<body>
    <nav>
        <ul>
            <li>
                <h1 id="h-logo">Namn</h1>
            </li>
            <li><a href="index.html">Hem</a></li>
            <li><a href="activities.html">Aktiviteter</a></li>
            <li>
                <p>Om oss</p>
            </li>
        </ul>
    </nav>

    <main>
        <div id="filters">
            <p>Hitta en aktivitet för ett specifikt evenemang:</p>
            <button>Svensexa / Möhippa</button>
            <button>Teambuilding / AW</button>
            <button>Kick-off</button>


            <input type="search" class="search" placeholder="Sök här">
            <button class="search-btn">Sök</button>
            <p>Sortera</p>
            <p>Filter</p>

            <label for="provincefilter">Landskap</label>
            <select id="provincefilter">
                <option value="Alla">Alla</option>
                <option value="Småland">Småland</option>
                <option value="Öland">Öland</option>
            </select>

            <label for="pricefilter">Pris</label>
            <select id="pricefilter">
                <option value="Alla">Alla</option>
                <option value="100-250">100-250 kr</option>
                <option value="250-500">250-500 kr</option>
                <option value="500-1000">500-1000 kr</option>
            </select>

            <fieldset>
                <legend>Filtrera aktiviteter</legend>

                <input type="checkbox" id="Bowling" name="aktiviteter" value="Bowling">
                <label for="Bowling">Bowling</label>

                <input type="checkbox" id="Gokart" name="aktiviteter" value="Gokart">
                <label for="Gokart">Gokart</label>

                <input type="checkbox" id="Golf" name="aktiviteter" value="Golf">
                <label for="Golf">Golf</label>
            </fieldset>
        </div>

        <div class="results">
            <div class="activity">
                <h3>Aktivitet</h3>
                <p>Stad, Landskap</p>
                <p>Pris</p>
                <button>Läs mer</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Detta är inte ett riktigt företag/webbplats</p>
    </footer>
</body>

</html>
