<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="global.css">
    <script src="config.js"></script>
    <!-- <script type="module" src="filter.js"></script> -->

    <title>Kick-off</title>
</head>

<body>
    <nav>
        <h1 id="h-logo">Namn</h1>
        <p>Aktiviteter</p>
        <p>Om oss</p>
    </nav>

    <header>
        <p>Hitta den perfekta aktiviteten till ditt evenemang!</p>
        <button>Bläddra/Jag känner mig modig</button>
    </header>

    <main>
        <div id="categories">
            <p>Hitta en aktivitet för ett specifikt evenemang:</p>
            <button>Svensexa / Möhippa</button>
            <button>Teambuilding / AW</button>
            <button>Kick-off</button>
            <input type="text"> <button>Sök</button>
        </div>

        <div id="examples">
            <h2>Förslag på aktiviteter</h2>
            <div class="activity">
                <h3>Aktivitet</h3>
                <p>Stad, Landskap</p>
                <button>Läs mer</button>
            </div>
        </div>

         <div class="results">
            <div class="activity">
                <h3>Aktivitet</h3>
                <p>Stad, Landskap</p>
                <p>Pris</p>
                <button>Läs mer</button>
            </div>
        </div>
    </main>

    <footer>
        <p>Detta är inte ett riktigt företag/webbplats</p>
    </footer>
</body>

</html>
